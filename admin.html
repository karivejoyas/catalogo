<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel administrador · Karivé Joyas</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="catalogo.css" />
</head>
<body>

<div id="adm-login" class="adm-login">
  <form id="adm-login-form" class="adm-login-tarjeta">
    <div class="adm-login-marca">Karivé <span class="cat-dorado">·</span> Joyas</div>
    <div class="adm-login-sub">Panel administrador</div>
    <input type="password" id="adm-pass" class="adm-input" placeholder="Contraseña" autocomplete="current-password" required />
    <button type="submit" class="adm-btn">Entrar</button>
    <div id="adm-login-error" class="adm-error" hidden>Contraseña incorrecta. Intenta de nuevo.</div>
  </form>
</div>

<div id="adm-app" hidden>

  <div class="adm-topbar">
    <span class="adm-marca">Karivé · Joyas <span class="adm-tag">— Panel administrador</span></span>
    <div class="adm-acciones">
      <a href="index.html" target="_blank" rel="noopener" class="adm-enlace">Ver catálogo público ↗</a>
      <button id="adm-salir" class="adm-btn-borde">Cerrar sesión</button>
    </div>
  </div>

  <div class="cat-buscador-barra">
    <div class="cat-buscador-fila">
      <div class="cat-buscador">
        <span class="cat-buscador-icono">⌕</span>
        <input id="adm-query" placeholder="Buscar por nombre o código…" autocomplete="off" />
      </div>
      <span class="cat-contador" id="adm-contador"></span>
      <button id="adm-reset" class="adm-btn-borde">Restaurar catálogo inicial</button>
    </div>
  </div>

  <section class="adm-seccion">
    <h2 class="adm-seccion-titulo">Datos de contacto</h2>
    <p class="adm-seccion-sub">Aparecen en la portada, la sección de información y el pie del catálogo.</p>
    <div class="adm-contacto">
      <label class="adm-etiqueta">Instagram</label>
      <input id="adm-ig" class="adm-input" placeholder="@tu_usuario" />
      <label class="adm-etiqueta">WhatsApp</label>
      <input id="adm-wa" class="adm-input" placeholder="+56 9 XXXX XXXX" />
      <button id="adm-guardar-contacto" class="adm-btn-solido">Guardar contacto</button>
      <span id="adm-contacto-ok" class="adm-guardado" hidden>✓ Guardado</span>
    </div>
  </section>

  <div id="adm-categorias"></div>

  <div style="height:60px;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="comun.js"></script>
<script src="admin.js"></script>
</body>
</html>
