<title>Catálogo Karivé · Joyas</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body class="fb-body">

<div class="fb-app">

  <div class="fb-topbar">
    <a href="#" class="fb-logo" id="fb-logo"><img src="assets/logo-karive-crop.png" alt="Karivé Joyas" /></a>
    <div class="fb-nav-wrap">
      <button class="fb-menu-btn" id="fb-menu-btn" aria-label="Seleccionar colección">
        <span class="fb-hamb">☰</span><span class="fb-menu-txt">Seleccionar colección</span>
      </button>
      <nav class="fb-nav" id="fb-nav"></nav>
    </div>
  </div>

  <div class="fb-stage">
    <button class="fb-arrow fb-prev" id="fb-prev" aria-label="Anterior">‹</button>
    <div class="fb-page-wrap">
      <div class="fb-page" id="fb-page"></div>
    </div>
    <button class="fb-arrow fb-next" id="fb-next" aria-label="Siguiente">›</button>
  </div>

  <div class="fb-footer">
    <button class="fb-arrow-mini" id="fb-prev2" aria-label="Anterior">‹</button>
    <span class="fb-counter" id="fb-counter">1 / 1</span>
    <button class="fb-arrow-mini" id="fb-next2" aria-label="Siguiente">›</button>
  </div>

  <!-- lightbox: producto ampliado -->
  <div class="fb-lightbox" id="fb-lightbox" hidden>
    <div class="fb-lb-backdrop" data-role="close"></div>
    <div class="fb-lb-card" role="dialog" aria-modal="true">
      <button class="fb-lb-x" data-role="close" aria-label="Cerrar">✕</button>
      <div class="fb-lb-foto" id="fb-lb-foto"></div>
      <div class="fb-lb-info">
        <span class="fb-lb-codigo" id="fb-lb-codigo"></span>
        <h3 class="fb-lb-nombre" id="fb-lb-nombre"></h3>
        <p class="fb-lb-detalle" id="fb-lb-detalle"></p>
        <div class="fb-lb-precio" id="fb-lb-precio"></div>
        <button class="fb-lb-cerrar" data-role="close">Cerrar ✕</button>
      </div>
    </div>
  </div>

</div>
